<!DOCTYPE html>
<html>
<head>
    <title>External Mic Recorder</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8f9fa; }
        .status { font-weight: bold; color: #dc3545; margin-bottom: 10px; }
        .pulse { width: 20px; height: 20px; background: #dc3545; border-radius: 50%; animation: pulse 1s infinite; display: none; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); } }
    </style>
</head>
<body>
    <div class="status" id="status">Waiting for command...</div>
    <div class="pulse" id="pulse"></div>
    <p style="font-size: 12px; color: #666; margin-top: 10px;">Do not close this window while recording.</p>

    <script>
        let stream;
        let isRecording = false;

        // Listen for commands from the Main Diary App
        window.addEventListener('message', async (event) => {
            console.log("Popup: Received command", event.data.command);
            if (event.data.command === 'START_RECORDING') {
                startRecording();
            } else if (event.data.command === 'STOP_RECORDING') {
                stopRecording();
            }
        });

        async function startRecording() {
            if (isRecording) return;
            try {
                if (!stream) {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                }
                isRecording = true;
                document.getElementById('status').innerText = "RECORDING ACTIVE";
                document.getElementById('pulse').style.display = "block";
                console.log("Popup: Recording Loop Started");
                runRecordingLoop();
            } catch (err) {
                console.error("Popup: Mic Error", err);
                const target = window.opener || window.parent;
                target.postMessage({ type: 'RECORDER_ERROR', message: err.message }, '*');
            }
        }

        function runRecordingLoop() {
            if (!isRecording) return;

            const recorder = new MediaRecorder(stream);
            const chunks = [];

            recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };

            recorder.onstop = async () => {
                if (chunks.length > 0) {
                    console.log("Popup: Chunk captured, sending to Main App...");
                    const blob = new Blob(chunks, { type: recorder.mimeType });
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64 = reader.result.split(',')[1];
                        // CRITICAL: Use window.opener for Popups, fallback to window.parent for Iframes
                        const target = window.opener || window.parent;
                        target.postMessage({
                            type: 'AUDIO_CHUNK',
                            base64: base64,
                            mimeType: recorder.mimeType
                        }, '*');
                    };
                    reader.readAsDataURL(blob);
                }
                if (isRecording) runRecordingLoop();
            };

            recorder.start();
            setTimeout(() => {
                if (recorder.state === "recording") recorder.stop();
            }, 7000); // 7 second chunks
        }

        function stopRecording() {
            isRecording = false;
            document.getElementById('status').innerText = "Recording Stopped";
            document.getElementById('pulse').style.display = "none";
            console.log("Popup: Recording Stopped");
        }
    </script>
</body>
</html>
